<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero Preview - CAPT</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    /* Basic page setup */
    body {
      background-color: #051850; /* Your site's dark blue background */
      color: white;
    }

    /* --- NEW HERO SECTION LAYOUT (Matching "MERCH REDEFINED") --- */
    .hero-new-layout {
      background-color: #051850; /* Dark background color */
      color: #fff;
      overflow: hidden; /* Hide potential grid overflow */
      position: relative;
    }

    /* Ensure the main content is centered vertically */
    .hero-new-layout .container-fluid {
      height: 100%;
      display: flex;
      align-items: center;
    }
    
    .hero-new-layout .row {
        width: 100%;
    }

    /* Left Column Styling */
    .hero-new-layout .hero-text-col {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: left;
      min-height: 40vh;
    }

    .hero-new-layout .hero-text-content {
      max-width: 600px;
      padding: 2rem;
    }

    .hero-new-layout h1 {
      font-size: 4rem; /* Adjust size as needed */
      font-weight: 800; /* Bold */
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    /* Make the second word your brand's green */
    .hero-new-layout h1 .highlight {
      color: #b0f414;
    }

    .hero-new-layout .lead {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      max-width: 500px;
    }

    /* Buttons Styling */
    .hero-new-layout .btn-success-light {
      background-color: #b0f414;
      border-color: #b0f414;
      color: #051850 !important; /* Dark text for contrast */
      font-weight: 700;
      padding: 0.75rem 1.5rem;
      border-radius: 50px; /* Pill shape */
    }
    .hero-new-layout .btn-success-light:hover {
      background-color: #c9ff41;
      border-color: #c9ff41;
      transform: translateY(-2px);
    }

    .hero-new-layout .btn-outline-light {
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      border-width: 2px;
    }
    
    .hero-new-layout .btn-outline-light:hover {
      background-color: #fff;
      color: #051850;
    }

    /* Right Column: Image Grid */
    .hero-new-layout .hero-grid-col {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      perspective: 1500px; /* For 3D effects */
    }

    .hero-image-grid {
      display: grid;
      /* 4 columns, 2 rows to match the 8 items in the example */
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
      max-width: 700px;
      padding: 20px;
      /* Add a subtle 3D tilt */
      transform: rotateY(-15deg) rotateX(5deg) scale(0.9);
      transition: transform 0.5s ease;
    }
    
    /* On hover, flatten the grid */
    .hero-new-layout:hover .hero-image-grid {
       transform: rotateY(0deg) rotateX(0deg) scale(1);
    }

    .hero-image-grid .grid-item {
      background-color: #333; /* Placeholder background */
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1 / 1; /* Keep items square */
    }
    
    .hero-image-grid .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .hero-image-grid .grid-item:hover img {
      transform: scale(1.1); /* Zoom on hover */
    }
    
    /* Animation: Staggered fade-in for grid items */
    .hero-image-grid .grid-item {
      opacity: 0;
      animation: fadeInGrid 0.5s ease forwards;
    }
    
    /* Create a staggered (waterfall) delay */
    .hero-image-grid .grid-item:nth-child(1) { animation-delay: 0.1s; }
    .hero-image-grid .grid-item:nth-child(2) { animation-delay: 0.2s; }
    .hero-image-grid .grid-item:nth-child(3) { animation-delay: 0.3s; }
    .hero-image-grid .grid-item:nth-child(4) { animation-delay: 0.4s; }
    .hero-image-grid .grid-item:nth-child(5) { animation-delay: 0.5s; }
    .hero-image-grid .grid-item:nth-child(6) { animation-delay: 0.6s; }
    .hero-image-grid .grid-item:nth-child(7) { animation-delay: 0.7s; }
    .hero-image-grid .grid-item:nth-child(8) { animation-delay: 0.8s; }

    @keyframes fadeInGrid {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }


    /* Responsive adjustments */
    @media (max-width: 991.98px) {
      .hero-new-layout .hero-text-content {
        text-align: center;
        padding-top: 3rem;
        padding-bottom: 3rem;
        margin-left: auto;
        margin-right: auto;
      }
      .hero-new-layout .d-flex.flex-column.flex-md-row.gap-3 {
        justify-content: center;
      }
      .hero-image-grid {
        /* 2 columns, 4 rows on mobile */
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        transform: none; /* Disable 3D tilt on mobile */
        max-width: 350px;
        margin: auto;
      }
    }
    
    @media (max-width: 767px) {
      .hero-new-layout h1 {
        font-size: 2.8rem;
      }
      .hero-new-layout .lead {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <section id="home" class="hero-new-layout vh-100 d-flex align-items-center">
    <div class="container-fluid">
      <div class="row align-items-center g-0">

        <div class="col-12 col-lg-6 hero-text-col">
          <div class="hero-text-content px-4 px-lg-5">
            <h1 class="display-1 fw-bold text-white mb-4">
              CONNECT<br>
              <span class="highlight">CAPTIVATE</span><br>
              CONVERT
            </h1>
            <p class="lead mb-5">
              Your ultimate partner for digital success. We craft bespoke digital experiences that engage audiences and drive results.
            </p>
            <div class="d-flex flex-column flex-md-row gap-3">
              <a href="#" class="btn btn-lg btn-success-light" data-bs-toggle="modal" data-bs-target="#contactModal">
                Get Started <i class="bi bi-arrow-right"></i>
              </a>
              <a href="#projects" class="btn btn-lg btn-outline-light">
                Our Work
              </a>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6 hero-grid-col">
          <div class="hero-image-grid">
            <div class="grid-item"><img src="https://via.placeholder.com/150/b0f414/051850?text=CAPT+1" alt="Work Sample 1"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/ffffff/051850?text=CAPT+2" alt="Work Sample 2"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/b0f414/051850?text=CAPT+3" alt="Work Sample 3"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/ffffff/051850?text=CAPT+4" alt="Work Sample 4"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/ffffff/051850?text=CAPT+5" alt="Work Sample 5"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/b0f414/051850?text=CAPT+6" alt="Work Sample 6"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/ffffff/051850?text=CAPT+7" alt="Work Sample 7"></div>
            <div class="grid-item"><img src="https://via.placeholder.com/150/b0f414/051850?text=CAPT+8" alt="Work Sample 8"></div>
          </div>
        </div>
        
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
